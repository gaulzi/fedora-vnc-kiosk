[supervisord]
nodaemon=true

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:xvfb]
command=/usr/bin/Xvfb :0 -screen 0 1920x1080x24
autorestart=true
priority=10

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=:0
autorestart=true
priority=20
startsecs=2

[program:browser]
command=/usr/local/bin/start-browser.sh
environment=DISPLAY=:0
autorestart=true
priority=30
startsecs=3
startretries=10

[program:vnc]
command=/usr/bin/x11vnc -display :0 -forever -shared -nopw -rfbport 5900 -afteraccept /usr/local/bin/vnc-connect.sh
autorestart=true
priority=40

[program:watchdog]
command=/usr/local/bin/watchdog-browser.sh
environment=DISPLAY=:0
autorestart=true
priority=50